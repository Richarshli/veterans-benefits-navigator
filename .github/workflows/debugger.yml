name: Automated Repository Debugger

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 10 * * *"

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run debugger
        run: python scripts/automated_debugger.py
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Upload debug reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: veterans-benefits-debug-report
          path: reports/
          retention-days: 30
